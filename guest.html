<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex, nofollow">
<title>SevenHome · Guest Area</title>
<style>
body{margin:0;background:#EDEAE4;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif}
.ld{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;gap:14px;color:#1A1A2E}
.ld-icon{width:54px;height:54px;background:#C9A84C;color:#1A1A2E;border-radius:14px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:20px}
.ld-txt{font-size:14px;color:#888}
.sp{width:22px;height:22px;border:3px solid #e0ddd8;border-top-color:#C9A84C;border-radius:50%;animation:r 1s linear infinite}
@keyframes r{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="ld"><div class="ld-icon">S7</div><div class="sp"></div><div class="ld-txt">Caricamento istruzioni…</div></div>
<script>
(async()=>{
  const id=new URLSearchParams(location.search).get('g');
  const fail=msg=>{document.body.innerHTML='<div class="ld"><div class="ld-icon">S7</div><div class="ld-txt">'+msg+'</div></div>';};
  if(!id||!/^[0-9a-fA-F-]{36}$/.test(id)){fail('Link non valido.');return;}
  try{
    const r=await fetch('https://iwjagihjnyzxythisedo.supabase.co/storage/v1/object/public/project-files/guest/'+id+'/guida.html');
    if(!r.ok){fail('Guida non trovata. Controlla il link ricevuto.');return;}
    const html=await r.text();
    document.open();document.write(html);document.close();
  }catch(e){fail('Connessione non riuscita. Riprova tra qualche istante.');}
})();
</script>
</body>
</html>
